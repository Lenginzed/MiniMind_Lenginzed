seed: 20260708
output_dir: outputs/pretrain_resume_smoke
tokenizer_path: data/tokenizers/mixed_tokenizer.json
train_data_path: data/processed_mixed/train.npy
val_data_path: data/processed_mixed/val.npy
prefer_cuda: true
dtype: auto

data:
  block_size: 64

model:
  vocab_size: 2000
  context_length: 64
  n_layer: 2
  n_embd: 128
  n_head: 4
  n_kv_head: 2
  intermediate_size: 256
  rms_norm_eps: 1.0e-6
  rope_theta: 10000.0
  dropout: 0.0
  tie_word_embeddings: true
  use_gradient_checkpointing: false

training:
  batch_size: 16
  gradient_accumulation_steps: 1
  max_steps: 30
  eval_interval: 10
  save_interval: 10
  log_interval: 10
  eval_batches: 4
  learning_rate: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: linear
  warmup_steps: 5

sample_prompts:
  - "Mini language models"
  - "小规模预训练"
