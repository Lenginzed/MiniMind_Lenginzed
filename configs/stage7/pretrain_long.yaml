seed: 20260713
output_dir: outputs/stage7/pretrain_long
model_config: configs/stage7/model_50m.yaml
tokenizer_path: data/stage7/tokenizers/stage7_tokenizer.json
train_data_path: data/stage7/processed_pretrain/train.npy
val_data_path: data/stage7/processed_pretrain/val.npy
prefer_cuda: true
dtype: bf16

data:
  block_size: 256

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  max_steps: 600
  eval_interval: 100
  save_interval: 200
  log_interval: 50
  eval_batches: 20
  learning_rate: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine
  warmup_steps: 60

sample_prompts:
  - "Mini language models"
  - "User: Explain LoRA.\nAssistant:"
  - "训练日志显示"
  - "Flight telemetry"
