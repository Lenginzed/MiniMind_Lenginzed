seed: 20260708
output_dir: outputs/pretrain_stage2_hardened
tokenizer_path: data/tokenizers/mixed_tokenizer.json
train_data_path: data/processed_mixed/train.npy
val_data_path: data/processed_mixed/val.npy
prefer_cuda: true
dtype: auto

data:
  block_size: 128

model:
  vocab_size: 2000
  context_length: 128
  n_layer: 3
  n_embd: 192
  n_head: 6
  n_kv_head: 2
  intermediate_size: 512
  rms_norm_eps: 1.0e-6
  rope_theta: 10000.0
  dropout: 0.0
  tie_word_embeddings: true
  use_gradient_checkpointing: true

training:
  batch_size: 16
  gradient_accumulation_steps: 1
  max_steps: 220
  eval_interval: 25
  save_interval: 50
  log_interval: 25
  eval_batches: 10
  learning_rate: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine
  warmup_steps: 20

sample_prompts:
  - "Mini language models"
  - "The scheduler"
  - "小规模预训练"
  - "Flight log"
