seed: 20260710
policy_checkpoint: outputs/sft_full/checkpoints/best.pt
reference_checkpoint: outputs/sft_full/checkpoints/best.pt
tokenizer_path: data/tokenizers/mixed_tokenizer.json
train_data_path: data/dpo/dpo_train.jsonl
val_data_path: data/dpo/dpo_val.jsonl
output_dir: outputs/dpo_lora
prefer_cuda: true
dtype: auto
max_length: 128
beta: 0.1

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

training:
  batch_size: 8
  gradient_accumulation_steps: 1
  max_steps: 140
  eval_interval: 25
  save_interval: 50
  log_interval: 25
  eval_batches: 10
  learning_rate: 3.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  scheduler: cosine
  warmup_steps: 20

sample_prompts:
  - "什么是 LoRA？"
  - "Explain causal language modeling."
  - "用三点解释 SFT 和预训练的区别。"
  - "What does gradient checkpointing do?"
  - "空战智能体为什么需要奖励函数？"
