seed: 20260718
policy_checkpoint: outputs/stage8_public/sft_public_full/checkpoints/best.pt
reference_checkpoint: outputs/stage8_public/sft_public_full/checkpoints/best.pt
tokenizer_path: data/stage8_public/tokenizers/public_tokenizer.json
train_data_path: data/stage8_public/dpo/dpo_train.jsonl
val_data_path: data/stage8_public/dpo/dpo_val.jsonl
output_dir: outputs/stage8_public/dpo_public_full
prefer_cuda: true
dtype: bf16
max_length: 256
beta: 0.1

training:
