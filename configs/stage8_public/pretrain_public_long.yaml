seed: 20260718
output_dir: outputs/stage8_public/pretrain_public_long
model_config: configs/stage8_public/model_50m_public.yaml
tokenizer_path: data/stage8_public/tokenizers/public_tokenizer.json
train_data_path: data/stage8_public/processed_pretrain/train.npy
val_data_path: data/stage8_public/processed_pretrain/val.npy
prefer_cuda: true
dtype: bf16

data:
  block_size: 256

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  max_steps: 1500
  eval_interval: 100
  save_interval: 500
  log_interval: 100
  eval_batches: 20
  learning_rate: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine
  warmup_steps: 100

sample_prompts:
  - "Once upon a time"
  - "A small language model"
  - "User: Explain LoRA.\nAssistant:"
  - "The training curve"
